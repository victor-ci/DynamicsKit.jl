name: TagBot

# Tags registered versions and creates GitHub Releases after a General-registry
# PR merges (triggered by a JuliaTagBot issue comment). Versions whose tag
# already exists are skipped.
on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@e4c81aa138ef4179bddea165bb4a9680c223aca4 # v1.25.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
