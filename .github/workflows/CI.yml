name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:   # lets the release workflow reuse this as a pre-tag gate

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write   # let julia-actions/cache prune its own stale caches (avoids 403 + cache bloat)

jobs:
  test:
    name: Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower bound = the declared compat floor; "1" tracks the latest 1.x release.
        version: ['1.11', '1']
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          # Strict bounds-checking (`yes`, the default): for a numerical library this catches an
          # out-of-bounds index hidden by an `@inbounds` hot loop, where `auto` would read garbage.
          # Worth the small overhead + one cold recompile. Coverage is off (not collected). After the
          # first warm cache, the run is dominated by the tests, not precompilation.
          coverage: false
          check_bounds: 'yes'
        env:
          # Exercise the threaded sweep/atlas paths in CI.
          JULIA_NUM_THREADS: '4'
