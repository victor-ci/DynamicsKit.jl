name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:   # lets the release workflow reuse this as a pre-tag gate

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Lower bound = the declared compat floor; "1" tracks the latest 1.x release.
        version: ['1.11', '1']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          # Exercise the threaded sweep/atlas paths in CI (Manifest is resolved fresh; library policy).
          JULIA_NUM_THREADS: '4'
