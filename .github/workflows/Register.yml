name: Register

# Manually triggered from the Actions tab. Validates the requested version, runs the full test
# suite as a gate, bumps Project.toml, pushes the bump to main, and comments
# `@JuliaRegistrator register` on that commit.
#
# From there the release is fully automated and this workflow is done: JuliaRegistrator opens the
# General-registry PR, AutoMerge lands it, and TagBot.yml then creates the vX.Y.Z git tag + GitHub
# Release (which in turn triggers the Zenodo archive). This workflow deliberately does NOT create the
# tag or the GitHub Release itself — TagBot owns those, and pre-creating the tag would collide with it.
#
# Prerequisite: a repository secret REGISTRATOR_TOKEN holding a PAT (classic: `repo` scope; or a
# fine-grained PAT for this repo with Contents: read & write) belonging to a user with push access
# (Victor). JuliaRegistrator only honors a trigger comment from an authorized repo user; the default
# GITHUB_TOKEN comments as github-actions[bot], which Registrator will not accept. The PAT also
# authors the bump commit/push so it is attributable to a real user.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, strict SemVer X.Y.Z (e.g. 0.2.0; a leading 'v' is accepted)"
        required: true
        type: string
      release_notes:
        description: "Optional release notes (markdown). Passed to Registrator and used by TagBot for the GitHub Release."
        required: false
        type: string

# Never run two registrations at once.
concurrency:
  group: register
  cancel-in-progress: false

permissions:
  contents: write   # push the bump commit
  actions: write    # CI.yml cache step requests this when reused as the release gate

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need every tag for the monotonic check
      - id: check
        env:
          RAW: ${{ inputs.version }}
        run: |
          set -euo pipefail
          ver="${RAW#v}"   # strip an optional leading 'v'

          # 1. Strict SemVer X.Y.Z (prerelease/build intentionally not supported yet).
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::'$RAW' is not a valid version. Expected strict SemVer X.Y.Z (e.g. 0.2.0)."
            exit 1
          fi
          tag="v$ver"

          # 2. The tag must not already exist (a registered version already carries its tag).
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists — that version is already released; pick a higher version."
            exit 1
          fi

          # 3. No going backwards: must be strictly greater than the latest v* tag.
          latest="$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n1 || true)"
          if [[ -n "$latest" ]]; then
            highest="$(printf '%s\n%s\n' "$latest" "$ver" | sort -V | tail -n1)"
            if [[ "$ver" == "$latest" || "$highest" != "$ver" ]]; then
              echo "::error::$ver is not greater than the latest release ($latest)."
              exit 1
            fi
          fi

          # 4. Project.toml must not already be ahead of the requested version.
          proj="$(grep -E '^version *= *"' Project.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ -n "$proj" && "$proj" != "$ver" ]]; then
            highestp="$(printf '%s\n%s\n' "$proj" "$ver" | sort -V | tail -n1)"
            if [[ "$highestp" != "$ver" ]]; then
              echo "::error::Project.toml version ($proj) is newer than requested ($ver)."
              exit 1
            fi
          fi

          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "Validated $tag (latest release: ${latest:-none}, Project.toml: ${proj:-none})."

  test:
    name: Test gate
    needs: validate
    uses: ./.github/workflows/CI.yml

  register:
    name: Bump & trigger registration
    needs: [validate, test]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      TAG: ${{ needs.validate.outputs.tag }}
      NOTES: ${{ inputs.release_notes }}
    steps:
      - name: Guard against missing token
        env:
          HAS_TOKEN: ${{ secrets.REGISTRATOR_TOKEN != '' }}
        run: |
          if [[ "$HAS_TOKEN" != "true" ]]; then
            echo "::error::REGISTRATOR_TOKEN secret is not set. Add a PAT with push access so the"
            echo "::error::@JuliaRegistrator comment is authored by an authorized user."
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Persist the PAT so the push (and thus the bump commit's author context) is a real user,
          # which is what JuliaRegistrator requires to honor the trigger comment.
          token: ${{ secrets.REGISTRATOR_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "Victor Iheanacho"
          git config user.email "victor.iheanacho@outlook.com"

      - name: Bump Project.toml version
        run: |
          set -euo pipefail
          perl -i -pe 's/^version\s*=\s*"[^"]*"/version = "$ENV{VERSION}"/' Project.toml
          grep -E '^version = ' Project.toml

      - name: Commit and push version bump (if changed)
        run: |
          set -euo pipefail
          if git diff --quiet -- Project.toml; then
            echo "Project.toml already at $VERSION; registering current HEAD."
          else
            git add Project.toml
            # [skip ci]: the test gate above already validated this tree; the bump only touches the
            # version string, so a second CI run on the bump commit would be redundant.
            git commit -m "Release $TAG [skip ci]"
            git push origin HEAD:main
          fi

      - name: Comment @JuliaRegistrator on the release commit
        env:
          GH_TOKEN: ${{ secrets.REGISTRATOR_TOKEN }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"

          body="@JuliaRegistrator register"
          if [[ -n "${NOTES:-}" ]]; then
            body="$body"$'\n\n'"Release notes:"$'\n\n'"$NOTES"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/comments" \
            -f body="$body"

          echo "Triggered JuliaRegistrator on $sha for $TAG."
          echo "Next (automated): Registrator opens the General PR -> AutoMerge -> TagBot tags $TAG + creates the GitHub Release."
