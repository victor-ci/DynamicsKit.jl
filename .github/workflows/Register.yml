name: Register

# Manually triggered from the Actions tab. Validates the requested version against Project.toml and
# the tag history, runs the full test suite as a gate, then comments `@JuliaRegistrator register` on
# the current default-branch commit.
#
# This workflow does NOT push to the default branch. The `main` branch is protected by a ruleset that
# requires all changes to go through a pull request, so the version bump must be merged first (see
# below). Registration itself is only a commit comment, which needs no push and does not touch the
# protected branch.
#
# Release procedure:
#   1. Open a PR that bumps `version` in Project.toml to X.Y.Z and merge it into main.
#   2. Run this workflow with the same X.Y.Z. It confirms main is at that version, gates on tests,
#      and comments `@JuliaRegistrator register` on main's HEAD.
#   3. From there it is automated: JuliaRegistrator opens the General-registry PR, AutoMerge lands it,
#      and TagBot.yml creates the vX.Y.Z tag + GitHub Release (which triggers the Zenodo archive).
#      This workflow deliberately does not create the tag or Release — TagBot owns those.
#
# Prerequisite: a repository secret REGISTRATOR_TOKEN holding a PAT (classic: `repo` scope; or a
# fine-grained PAT for this repo with Contents: read & write) belonging to a user with push access
# (Victor). JuliaRegistrator only honors a trigger comment from an authorized repo user; the default
# GITHUB_TOKEN comments as github-actions[bot], which Registrator will not accept.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to register, strict SemVer X.Y.Z (must already be merged into Project.toml on main; a leading 'v' is accepted)"
        required: true
        type: string
      release_notes:
        description: "Optional release notes (markdown). The Actions input is single-line — use \\n for line breaks; they are expanded before posting. Passed to Registrator and used by TagBot for the GitHub Release."
        required: false
        type: string

# Never run two registrations at once.
concurrency:
  group: register
  cancel-in-progress: false

permissions:
  contents: read    # checkout only; the trigger comment is posted with the PAT, not GITHUB_TOKEN
  actions: write    # CI.yml cache step requests this when reused as the release gate

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need every tag for the monotonic check
      - id: check
        env:
          RAW: ${{ inputs.version }}
        run: |
          set -euo pipefail
          ver="${RAW#v}"   # strip an optional leading 'v'

          # 1. Strict SemVer X.Y.Z (prerelease/build intentionally not supported yet).
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::'$RAW' is not a valid version. Expected strict SemVer X.Y.Z (e.g. 0.2.0)."
            exit 1
          fi
          tag="v$ver"

          # 2. The tag must not already exist (a registered version already carries its tag).
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists — that version is already released; pick a higher version."
            exit 1
          fi

          # 3. No going backwards: must be strictly greater than the latest v* tag.
          latest="$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n1 || true)"
          if [[ -n "$latest" ]]; then
            highest="$(printf '%s\n%s\n' "$latest" "$ver" | sort -V | tail -n1)"
            if [[ "$ver" == "$latest" || "$highest" != "$ver" ]]; then
              echo "::error::$ver is not greater than the latest release ($latest)."
              exit 1
            fi
          fi

          # 4. Project.toml on this (default) branch must already be AT the requested version.
          # This workflow does not push, so the bump PR must be merged before registering.
          proj="$(grep -E '^version *= *"' Project.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ "$proj" != "$ver" ]]; then
            echo "::error::Project.toml is at '$proj' but you requested $ver."
            echo "::error::Bump Project.toml to $ver via a pull request and merge it before running Register"
            echo "::error::(this workflow does not push to the protected default branch)."
            exit 1
          fi

          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "Validated $tag (latest release: ${latest:-none}, Project.toml: $proj)."

  test:
    name: Test gate
    needs: validate
    uses: ./.github/workflows/CI.yml

  register:
    name: Trigger registration
    needs: [validate, test]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      TAG: ${{ needs.validate.outputs.tag }}
      NOTES: ${{ inputs.release_notes }}
    steps:
      - name: Guard against missing token
        env:
          HAS_TOKEN: ${{ secrets.REGISTRATOR_TOKEN != '' }}
        run: |
          if [[ "$HAS_TOKEN" != "true" ]]; then
            echo "::error::REGISTRATOR_TOKEN secret is not set. Add a PAT belonging to a repo user so"
            echo "::error::the @JuliaRegistrator comment is authored by an authorized user."
            exit 1
          fi

      - uses: actions/checkout@v7

      - name: Comment @JuliaRegistrator on main's HEAD
        env:
          GH_TOKEN: ${{ secrets.REGISTRATOR_TOKEN }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"

          body="@JuliaRegistrator register"
          if [[ -n "${NOTES:-}" ]]; then
            # The Actions UI passes release_notes as a single line; expand \n escapes so the
            # notes render as multi-line markdown in the GitHub Release TagBot creates.
            expanded="$(printf '%b' "$NOTES")"
            body="$body"$'\n\n'"Release notes:"$'\n\n'"$expanded"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/comments" \
            -f body="$body"

          echo "Triggered JuliaRegistrator on $sha for $TAG."
          echo "Next (automated): Registrator opens the General PR -> AutoMerge -> TagBot tags $TAG + creates the GitHub Release."
